name: Fetch UN Journal

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          echo "PUPPETEER_EXECUTABLE_PATH=$(which chromium-browser)" >> $GITHUB_ENV
          echo "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install puppeteer --no-save

      - name: Fetch UN Journal
        run: node scripts/fetch-journal.cjs

      - name: Show result
        run: cat public/journal.json

      - name: Commit changes
        run: |
          git config user.name "UN Journal Bot"
          git config user.email "bot@un-briefing"
          git add public/journal.json public/journal-debug.png 2>/dev/null || true
          git diff --staged --quiet && echo "No changes" || (git commit -m "📋 Update UN Journal: $(TZ=America/New_York date +'%Y-%m-%d')" && git push)
