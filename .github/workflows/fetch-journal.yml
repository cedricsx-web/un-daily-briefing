name: Fetch UN Journal

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install jsdom
        run: npm install jsdom --no-save

      - name: Fetch UN Journal
        run: node scripts/fetch-journal.cjs

      - name: Commit journal.json if changed
        run: |
          git config user.name "UN Journal Bot"
          git config user.email "bot@un-briefing"
          git add public/journal.json
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "📋 Update UN Journal: $(date +'%Y-%m-%d')" && git push)
