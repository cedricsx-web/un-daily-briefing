name: Fetch UN Journal

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache Puppeteer browser
        id: puppeteer-cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/puppeteer
          key: puppeteer-chrome-linux-v1

      - name: Install Puppeteer and browser
        run: |
          npm install puppeteer --no-save
          if [ "${{ steps.puppeteer-cache.outputs.cache-hit }}" != "true" ]; then
            npx puppeteer browsers install chrome
          fi

      - name: Fetch UN Journal
        run: node scripts/fetch-journal.cjs

      - name: Show result
        run: cat public/journal.json

      - name: Commit changes
        run: |
          git config user.name "UN Journal Bot"
          git config user.email "bot@un-briefing"
          git add public/journal.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "Update UN Journal: $(TZ=America/New_York date +'%Y-%m-%d')" && git push)
